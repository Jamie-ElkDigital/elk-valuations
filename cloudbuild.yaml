steps:
  # Use Kaniko for extremely fast builds with aggressive layer caching
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - --destination=europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/elk-valuations:$COMMIT_SHA
      - --cache=true
      - --cache-ttl=168h  # Cache layers for 7 days
      - --dockerfile=Dockerfile
      - --context=dir:///workspace

  # Deploy to Cloud Run with SaaS scaling configuration
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'elk-valuations'
      - '--image'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/elk-valuations:$COMMIT_SHA'
      - '--region'
      - 'europe-west2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '1'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'

images:
  - 'europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/elk-valuations:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
